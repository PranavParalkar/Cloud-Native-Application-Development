AWSTemplateFormatVersion: '2010-09-09' 
Description: Root Stack - Orchestrates VPC, IAM, EC2 
  
Parameters: 
  TemplateBucket: 
    Type: String 
    Default: my-cfn-templates-bucket 
  
Resources: 
  VPCStack: 
    Type: AWS::CloudFormation::Stack 
    Properties: 
      TemplateURL: !Sub 'https://${TemplateBucket}.s3.amazonaws.com/vpc-stack.yaml' 
      TimeoutInMinutes: 10 
      Parameters: 
        VpcCIDR: 10.0.0.0/16 
  
  IAMStack: 
    Type: AWS::CloudFormation::Stack 
    Properties: 
      TemplateURL: !Sub 'https://${TemplateBucket}.s3.amazonaws.com/iam-stack.yaml' 
      TimeoutInMinutes: 10 
  
  EC2Stack: 
    Type: AWS::CloudFormation::Stack 
    DependsOn: [VPCStack, IAMStack] 
    Properties: 
      TemplateURL: !Sub 'https://${TemplateBucket}.s3.amazonaws.com/ec2-stack.yaml' 
      TimeoutInMinutes: 15 
      Parameters: 
        VpcId:           !GetAtt VPCStack.Outputs.VpcId 
        SubnetId:        !GetAtt VPCStack.Outputs.SubnetId 
        InstanceProfile: !GetAtt IAMStack.Outputs.InstanceProfileArn 
  
Outputs: 
  WebServerIP: 
    Value: !GetAtt EC2Stack.Outputs.PublicIP 
    Description: Public IP of the web server

    